<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>display property</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
    }
    .Box{
        height:100px;
        width:100px;
        margin:5px;
        background-color:chartreuse;
        display:inline;
        display:inline-block;
       
    }
  
</style>
<body>
    <div id="box1" class="Box" >Box1</div>
    <div id="box2" class="Box" >Box2</div>

</body>
</html>
