<!DOCTYPE html>
<html lang="en">
<head>
   
    <title> Position Property</title>
    <style>
        *{ 
            margin:0;
            padding:0;
        }
        .box{
            margin:5px;
            height:50px;
            width:50px;
            background-color:mediumpurple;
        }
        #box1{
            position: static;
        }
        #box2{
            position:relative;
            top:10px;
            left:30px;
        }
        #box3{
            position:absolute ;
            top:30px;
        }
        #box4{
            position:fixed;
            right:10px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box" >Box1</div>
    <div id="box2" class="box" >Box2 </div>
    <div id="box3" class="box" >Box3</div>
    <div id="box4" class="box" >Box4</div>
    
</body>
</html>
