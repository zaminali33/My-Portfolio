<!DOCTYPE html>
<html>
<head>
    <title>My CV</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        fieldset {
            margin-bottom: 15px;
            border-radius: 8px;
        }

        legend {
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .checkbox-group input {
            width: auto;
        }

        .radio-group input {
            width: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>My CV</h1>

    <!-- Personal Info -->
    <fieldset>
        <legend>Personal Information</legend>

        <label>Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <!-- Gender -->
        <label>Gender:</label>
        <div class="radio-group">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <!-- City -->
        <label>City:</label>
        <select>
            <option>Select your city</option>
            <option>Lahore</option>
            <option>Karachi</option>
            <option>Islamabad</option>
            <option>Rawalpindi</option>
        </select>

    </fieldset>

    <!-- Skills -->
    <fieldset>
        <legend>Skills</legend>

        <div class="checkbox-group">
            <input type="checkbox"> HTML <br>
            <input type="checkbox"> CSS <br>
            <input type="checkbox"> JavaScript <br>
        </div>

    </fieldset>

    <!-- About -->
    <fieldset>
        <legend>About Me</legend>

        <textarea rows="5" placeholder="Write about yourself..."></textarea>

    </fieldset>

</div>

</body>
</html>
