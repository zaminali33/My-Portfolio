<!DOCTYPE html>
<html lang="en">
<head>
    <title> float property </title>
    <style>
        *{
            margin:0px;
        }
        #container{
            
            height:300px;
            width:500px;
            background-color: rgb(128, 28, 128);
            border:3px solid black;
        }
        .box{
            background-color: rgb(44, 163, 44);
            height:100px;
            width:100px;
            margin:4px;
            border:3px solid black;
            float:right;
        }
        p{
            text-align: center;
            text-decoration: underline;
            text-decoration-color: floralwhite;
        }
    </style>
</head>
<body>
    <div id="container">
        <p> I love Coding </p>
        <div id="box1" class="box" ></div>
    </div>
</body>
</html>
