<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Padding</title>
</head>
<style>
    *{ margin: 0;
       padding:0;
       
    }
    .pad{
        height:50px;
        width:50px;
        margin: 5px;
        padding:2px;
        border-radius: 5px;}
    #first{
        box-sizing: border-box;
        border:2px solid;
        background-color: blueviolet;
    }
    #second{
        border:3px dashed red;
        
        background-color: blueviolet;
    }

</style>
<body>
    <div id="first" class="pad">first</div>
    <div id="second"class="pad" >second</div>
</body>
</html>
